name: Rules Audit

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  audit-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run rules audit
        run: ./scripts/audit-rules.sh

      - name: Verify employee personality bundles are in sync
        run: ./scripts/check-employee-personality.sh

      - name: Print rules scorecard
        run: ./scripts/rules-scorecard.sh
