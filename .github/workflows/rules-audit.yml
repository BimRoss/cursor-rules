name: Rules Audit

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  audit-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run rules audit
        run: ./scripts/audit-rules.sh

      - name: Verify alex-personality.md is in sync
        run: ./scripts/check-alex-personality.sh

      - name: Print rules scorecard
        run: ./scripts/rules-scorecard.sh
