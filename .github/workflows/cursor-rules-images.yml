name: Build cursor-rules bundle image

# Run JavaScript-based actions on Node.js 24 (runner deprecation of Node 20; security patches).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  cursor-rules-bundle:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: geeemoney/cursor-rules
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify employee personality bundles match rules
        run: ./scripts/check-employee-personality.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=build,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gitops-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - cursor-rules-bundle
    env:
      RANCHER_ADMIN_REPO: bimross/rancher-admin
    steps:
      - name: Compute release version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout rancher-admin
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RANCHER_ADMIN_REPO }}
          ref: master
          token: ${{ secrets.RANCHER_ADMIN_REPO_TOKEN }}
          path: rancher-admin

      - name: Update cursor-rules image tag in employee-factory deployment
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"]
          paths = [
              Path("rancher-admin/admin/apps/employee-factory/alex-deployment.yaml"),
              Path("rancher-admin/admin/apps/employee-factory/tim-deployment.yaml"),
              Path("rancher-admin/admin/apps/employee-factory/ross-deployment.yaml"),
              Path("rancher-admin/admin/apps/employee-factory/garth-deployment.yaml"),
              Path("rancher-admin/admin/apps/employee-factory/joanne-deployment.yaml"),
          ]
          pattern = r"(geeemoney/cursor-rules:)[^\s\"']+"
          for path in paths:
              content = path.read_text()
              updated = re.sub(pattern, lambda m: f"{m.group(1)}{version}", content)
              path.write_text(updated)
          PY

      - name: Commit and push manifest updates
        working-directory: rancher-admin
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git config user.name "cursor-rules-ci"
          git config user.email "cursor-rules-ci@users.noreply.github.com"
          git add admin/apps/employee-factory/alex-deployment.yaml admin/apps/employee-factory/tim-deployment.yaml admin/apps/employee-factory/ross-deployment.yaml admin/apps/employee-factory/garth-deployment.yaml admin/apps/employee-factory/joanne-deployment.yaml
          git commit -m "release(cursor-rules): bump cursor-rules bundle to ${VERSION}"
          git push origin master
